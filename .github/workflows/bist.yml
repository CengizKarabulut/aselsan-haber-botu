name: TradingView Kusursuz Haber Botu

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/bist.yml'
      - 'aselsan_news_bot.py'
  schedule:
    - cron: '9,24,39,54 * * * *'
  workflow_dispatch:

concurrency:
  group: aselsan-tradingview-news
  cancel-in-progress: false

jobs:
  check-tv-news:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Kodu cek
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Python kur
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Tarayici ve kutuphaneleri yukle
        run: |
          pip install requests beautifulsoup4 playwright
          playwright install --with-deps chromium

      - name: TradingView ASELS haberlerini cek ve gonder
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_MESSAGE_THREAD_ID: ${{ secrets.TELEGRAM_MESSAGE_THREAD_ID }}
        run: |
          python aselsan_news_bot.py

      - name: Cache kaydet
        run: |
          git config --global user.email "action@github.com"
          git config --global user.name "GitHub Action"
          git pull --rebase --autostash || true
          git add tv_news_cache.json
          if git diff --cached --quiet; then
            echo "Degisiklik yok"
            exit 0
          fi
          git commit -m "TV onbellek guncellendi [skip ci]"
          for attempt in 1 2 3; do
            git pull --rebase --autostash && git push && exit 0
            echo "Push denemesi ${attempt} basarisiz; tekrar denenecek."
            sleep 5
          done
          echo "Cache GitHub'a yazilamadi."
          exit 1
