name: TradingView Kusursuz Haber Botu

on:
  push:
    branches:
      - main
      - agent/diagnose-asels-telegram-conflict
    paths:
      - '.github/workflows/bist.yml'
      - 'aselsan_news_bot.py'
  schedule:
    - cron: '9 * * * *'
    - cron: '24 * * * *'
    - cron: '39 * * * *'
    - cron: '54 * * * *'
  repository_dispatch:
    types:
      - aselsan-news-tick
  workflow_dispatch:

jobs:
  check-tv-news:
    runs-on: ubuntu-latest
    concurrency:
      group: aselsan-tradingview-news-check
      cancel-in-progress: false
    permissions:
      contents: write

    steps:
      - name: Kodu cek
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Python kur
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Tarayici ve kutuphaneleri yukle
        run: |
          pip install requests beautifulsoup4 playwright
          playwright install --with-deps chromium

      - name: TradingView ASELS haberlerini cek ve gonder
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_MESSAGE_THREAD_ID: ${{ secrets.TELEGRAM_MESSAGE_THREAD_ID }}
        run: |
          python aselsan_news_bot.py

      - name: Telegram baglanti testi
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python - <<'PY'
          import os
          import requests

          response = requests.post(
              f"https://api.telegram.org/bot{os.environ['TELEGRAM_TOKEN']}/sendMessage",
              json={
                  "chat_id": os.environ["TELEGRAM_CHAT_ID"],
                  "text": "ASELSAN haber botu baglanti testi basarili.",
                  "disable_notification": True,
              },
              timeout=20,
          )
          response.raise_for_status()
          payload = response.json()
          if not payload.get("ok"):
              raise RuntimeError(str(payload)[:300])
          print(f"Telegram test mesaji gonderildi. Chat ID: {payload['result']['chat']['id']}")
          PY

      - name: Cache kaydet
        run: |
          git config --global user.email "action@github.com"
          git config --global user.name "GitHub Action"
          git pull --rebase --autostash || true
          git add tv_news_cache.json
          if git diff --cached --quiet; then
            echo "Degisiklik yok"
            exit 0
          fi
          git commit -m "TV onbellek guncellendi [skip ci]"
          for attempt in 1 2 3; do
            git pull --rebase --autostash && git push && exit 0
            echo "Push denemesi ${attempt} basarisiz; tekrar denenecek."
            sleep 5
          done
          echo "Cache GitHub'a yazilamadi."
          exit 1

  schedule-next:
    needs: check-tv-news
    if: ${{ always() && (github.event_name == 'push' || github.event_name == 'workflow_dispatch' || github.event_name == 'repository_dispatch') }}
    runs-on: ubuntu-latest
    concurrency:
      group: aselsan-tradingview-news-ticker
      cancel-in-progress: true
    permissions:
      contents: write

    steps:
      - name: Sonraki calismayi tetikle
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "15 dakika sonra bir sonraki calisma tetiklenecek."
          sleep 900
          curl -fsSL -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/${{ github.repository }}/dispatches \
            --data '{"event_type":"aselsan-news-tick"}'
