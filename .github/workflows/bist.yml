name: BIST Tüm Canlı Haber Botu
on:
  schedule:
    - cron: '*/15 6-16 * * 1-5' # Hafta içi borsa saatlerinde her 15 dakikada bir çalışır
  workflow_dispatch:

jobs:
  check-bist-news:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
      - name: Kodu Çek
        uses: actions/checkout@v4

      - name: Python Kur
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Gerekli Kütüphaneleri Yükle
        run: pip install requests beautifulsoup4 lxml

      - name: BIST Haberlerini Çek ve Telegram'a At
        shell: python
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          import requests
          from bs4 import BeautifulSoup
          import os
          import json
          import urllib.parse

          # Tüm BIST hisselerini kapsayacak genel borsa araması
          query = '"Borsa İstanbul" OR "KAP Bildirimi" OR "Hisse Haberleri"'
          url = f"https://news.google.com/rss/search?q={urllib.parse.quote(query)}&hl=tr&gl=TR&ceid=TR:tr"
          
          try:
              response = requests.get(url, timeout=30)
              response.raise_for_status()
          except Exception as e:
              print(f"Hata: Haber kaynağına erişilemedi: {e}")
              exit(1)

          soup = BeautifulSoup(response.content, 'xml')
          items = soup.find_all('item')

          token = os.environ.get('TELEGRAM_TOKEN')
          chat_id = os.environ.get('TELEGRAM_CHAT_ID')

          def telegram_mesaj_gonder(text):
              tg_url = f"https://api.telegram.org/bot{token}/sendMessage"
              requests.post(tg_url, json={"chat_id": chat_id, "text": text, "parse_mode": "Markdown"}, timeout=10)

          found_news = []
          # Genel havuzdan en güncel 15 haberi kontrol et
          for item in items[:15]:
              title = item.title.text
              link = item.link.text
              if title and link:
                  found_news.append((title, link))

          cache_file = "bist_news_cache.json"
          old_news = []
          if os.path.exists(cache_file):
              try:
                  with open(cache_file, "r") as f:
                      old_news = json.load(f)
              except:
                  old_news = []

          new_saved_news = [title for title, _ in found_news]

          if not old_news:
              if found_news:
                  telegram_mesaj_gonder("🚀 *BIST TÜM Haber Takip Botu Aktif!* Güncel Akış Başlatıldı.\n" + "—"*15)
                  for title, link in found_news[:3]:
                      msg = f"🔔 *BIST Gelişme:*\n\n{title}\n\n[Detayları Gör]({link})"
                      telegram_mesaj_gonder(msg)
          else:
              has_new = False
              for title, link in reversed(found_news[:8]): 
                  if title not in old_news:
                      msg = f"🔔 *YENİ BIST GELİŞMESİ:*\n\n{title}\n\n[Detayları Gör]({link})"
                      telegram_mesaj_gonder(msg)
                      has_new = True
              
              if not has_new:
                  print("Yeni borsa haberi bulunamadı.")

          with open(cache_file, "w") as f:
              json.dump(new_saved_news, f)

      - name: Cache Güncelle
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add bist_news_cache.json
          git commit -m "Borsa önbelleği güncellendi [skip ci]" || echo "Değişiklik yok"
          git push
