name: TradingView Full Haber Botu (24/7 Hata Ayıklamalı)
on:
  schedule:
    - cron: '*/15 * * * *' # 7/24 Her 15 dakikada bir çalışır
  workflow_dispatch: # Elle test etmek için buton

jobs:
  check-tv-news:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
      - name: Kodu Çek
        uses: actions/checkout@v4

      - name: Python Kur
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Gerekli Kütüphaneleri Yükle
        run: pip install requests cloudscraper beautifulsoup4

      - name: Haber Detaylarını Çek ve Gönder
        shell: python
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          import cloudscraper
          from bs4 import BeautifulSoup
          import os
          import json
          import time
          import html
          import requests

          print("Adım 1: TradingView'e bağlanılıyor...")
          url = "https://tr.tradingview.com/news-flow/"
          scraper = cloudscraper.create_scraper(browser={'browser': 'chrome', 'platform': 'windows', 'mobile': False})
          
          try:
              response = scraper.get(url, timeout=30)
              print(f"Sunucu Yanıt Kodu: {response.status_code}")
              if response.status_code != 200:
                  print("KRİTİK HATA: TradingView bulut sunucusunu engelledi (Cloudflare Captcha).")
                  exit(1)
          except Exception as e:
              print(f"Bağlantı hatası: {e}")
              exit(1)

          soup = BeautifulSoup(response.text, 'html.parser')

          token = os.environ.get('TELEGRAM_TOKEN')
          chat_id = os.environ.get('TELEGRAM_CHAT_ID')
          
          if not token or not chat_id:
              print("KRİTİK HATA: GitHub Secrets içine TELEGRAM_TOKEN veya TELEGRAM_CHAT_ID eklenmemiş!")
              exit(1)

          found_news_links = []
          print("Adım 2: Sayfadaki haber linkleri taranıyor...")
          
          for a in soup.find_all('a', href=True):
              link = a['href']
              # Linkin içinde news veya haber kelimesi geçiyorsa yakala
              if '/news/' in link or '/haber/' in link:
                  title = a.get_text(separator=" ", strip=True)
                  if len(title) < 15: continue
                      
                  if not link.startswith('http'):
                      link = "https://tr.tradingview.com" + link
                      
                  if not any(n['link'] == link for n in found_news_links):
                      found_news_links.append({'title': title, 'link': link})
                      
                  if len(found_news_links) >= 20: 
                      break

          print(f"Bulunan geçerli haber sayısı: {len(found_news_links)}")
          if len(found_news_links) == 0:
              print("UYARI: Sayfaya erişildi ancak haber linki bulunamadı. HTML yapısı farklı gelmiş olabilir.")

          cache_file = "tv_news_cache.json"
          old_news = []
          if os.path.exists(cache_file):
              try:
                  with open(cache_file, "r") as f:
                      old_news = json.load(f)
              except:
                  old_news = []

          new_saved_news = [news['title'] for news in found_news_links]
          news_to_process = []

          if not old_news:
              print("Adım 3: İlk kurulum algılandı. Sadece son 3 haber test için gönderilecek.")
              news_to_process = found_news_links[:3]
          else:
              for news in reversed(found_news_links): 
                  if news['title'] not in old_news:
                      news_to_process.append(news)
              print(f"Gönderilecek YENİ haber sayısı: {len(news_to_process)}")

          for news in news_to_process:
              try:
                  print(f"İçeriğine giriliyor: {news['title'][:30]}...")
                  art_resp = scraper.get(news['link'], timeout=15)
                  art_soup = BeautifulSoup(art_resp.text, 'html.parser')
                  
                  paragraphs = art_soup.select('article p, div[class*="body"] p')
                  if not paragraphs:
                      paragraphs = art_soup.find_all('p')
                  
                  full_text = "\n\n".join([p.get_text(strip=True) for p in paragraphs if len(p.get_text(strip=True)) > 30])
                  
                  if not full_text:
                      full_text = "Haber metni çekilemedi. Lütfen orijinal bağlantıdan inceleyin."
                  
                  limit = 3500
                  text_chunks = []
                  temp_text = full_text
                  
                  while len(temp_text) > limit:
                      split_at = temp_text.rfind('\n\n', 0, limit)
                      if split_at == -1: split_at = temp_text.rfind('. ', 0, limit)
                      if split_at == -1: split_at = temp_text.rfind(' ', 0, limit)
                      if split_at == -1: split_at = limit
                      
                      if temp_text[split_at:split_at+2] == '. ': split_at += 1
                          
                      text_chunks.append(temp_text[:split_at].strip())
                      temp_text = temp_text[split_at:].strip()
                      
                  if temp_text: text_chunks.append(temp_text)

                  for i, chunk in enumerate(text_chunks):
                      if len(text_chunks) == 1:
                          msg = f"<b>{html.escape(news['title'])}</b>\n<blockquote>{html.escape(chunk)}\n\n<a href='{news['link']}'>[Orijinal Kaynağa Git]</a></blockquote>"
                      else:
                          if i == 0:
                              msg = f"<b>{html.escape(news['title'])}</b>\n<blockquote>{html.escape(chunk)} <i>\n\n(Devamı ⬇️)</i></blockquote>"
                          elif i == len(text_chunks) - 1:
                              msg = f"<blockquote>{html.escape(chunk)}\n\n<a href='{news['link']}'>[Orijinal Kaynağa Git]</a></blockquote>"
                          else:
                              msg = f"<blockquote>{html.escape(chunk)} <i>\n\n(Devamı ⬇️)</i></blockquote>"
                      
                      tg_url = f"https://api.telegram.org/bot{token}/sendMessage"
                      payload = {"chat_id": chat_id, "text": msg, "parse_mode": "HTML", "link_preview_options": {"is_disabled": True}}
                      
                      tg_resp = requests.post(tg_url, json=payload, timeout=10)
                      if tg_resp.status_code != 200:
                          print(f"TELEGRAM GÖNDERİM HATASI: {tg_resp.text}")
                      
                      time.sleep(2)
                      
              except Exception as e:
                  print(f"Haber işlenirken hata: {e}")

          with open(cache_file, "w") as f:
              json.dump(new_saved_news, f)
          print("İşlem tamamlandı, hafıza güncellendi.")

      - name: Cache Güncelle
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add tv_news_cache.json
          git commit -m "TV önbellek güncellendi [skip ci]" || echo "Değişiklik yok"
          git push
