name: TradingView Kusursuz Haber Botu
on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  check-tv-news:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
      - name: Kodu Çek
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Python Kur
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Tarayıcı ve Kütüphaneleri Yükle
        run: |
          pip install requests beautifulsoup4 playwright
          playwright install --with-deps chromium

      - name: Haber Detaylarını Çek ve Gönder
        shell: python
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          from playwright.sync_api import sync_playwright
          from bs4 import BeautifulSoup
          import os
          import json
          import time
          import html
          import requests

          token = os.environ.get('TELEGRAM_TOKEN')
          chat_id = os.environ.get('TELEGRAM_CHAT_ID')
          
          cache_file = "tv_news_cache.json"
          old_news = []
          if os.path.exists(cache_file):
              try:
                  with open(cache_file, "r") as f:
                      old_news = json.load(f)
              except:
                  old_news = []

          yasakli_icerikler = ["ICE Data Services", "FactSet", "Telif Hakkı", "CUSIP", "SEC dosyaları", "TradingView, Inc", "Tüm hakları saklıdır"]

          with sync_playwright() as p:
              print("Adım 1: TradingView'e bağlanılıyor...")
              browser = p.chromium.launch(headless=True)
              context = browser.new_context(
                  user_agent="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36",
                  viewport={"width": 1920, "height": 1080}
              )
              page = context.new_page()

              try:
                  # Sadece DOM iskeleti yüklenene kadar bekle
                  page.goto("https://tr.tradingview.com/news-flow/", timeout=30000, wait_until="domcontentloaded")
                  page.wait_for_timeout(3000)
                  
                  # Ekrandaki gizli haberleri uyandırmak için hafifçe aşağı kaydır
                  page.evaluate("window.scrollBy(0, 1000)")
                  page.wait_for_timeout(2000)
              except Exception as e:
                  print(f"Uyarı: Sayfa tam yüklenmemiş olabilir ama işleme devam ediliyor... ({e})")

              print("Adım 2: X-Ray taraması ile haberler ayıklanıyor...")
              
              # BOTUN KÖR NOKTASINI ÇÖZEN JAVASCRIPT X-RAY KODU
              found_news_links = page.evaluate('''() => {
                  let results = [];
                  let links = document.querySelectorAll('a[href*="/news/"]');
                  let yasakli = ["giriş yapın", "özel haber", "premium"];
                  
                  for (let a of links) {
                      let href = a.getAttribute('href');
                      if (href.includes('/markets/') || href.includes('/crypto/') || href.includes('/stocks/') || href.includes('/all/') || href.includes('/authors/') || href.includes('/symbols/')) continue;
                      
                      // HAYALET LİNK ÇÖZÜMÜ: Link boşsa (overlay ise), onu kapsayan dış kutunun metnini al
                      let text = a.innerText.trim();
                      if (!text || text.length < 10) {
                          text = a.parentElement ? a.parentElement.innerText.trim() : "";
                      }
                      if (!text || text.length < 10) {
                          text = a.textContent.trim(); 
                      }
                      
                      // Metni satır satır ayırıp anlamsız kısa kelimeleri (saat, tarih, kanal adı) ele
                      let lines = text.split('\\n').map(l => l.trim()).filter(l => l.length > 10);
                      if (lines.length === 0) continue;
                      
                      // Kalan satırlar içindeki en uzun cümlenin "Başlık" olma ihtimali %99'dur
                      let title = lines.reduce((longest, current) => current.length > longest.length ? current : longest, "");
                      
                      let isYasak = yasakli.some(y => title.toLowerCase().includes(y));
                      
                      if (title.length > 15 && !isYasak) {
                          let full_link = href.startsWith('http') ? href : "https://tr.tradingview.com" + href;
                          // Eğer bu link listeye henüz eklenmediyse ekle (Tekrarları önler)
                          if (!results.some(r => r.link === full_link)) {
                              results.push({title: title, link: full_link});
                          }
                      }
                      if (results.length >= 25) break;
                  }
                  return results;
              }''')

              print(f"-> Sayfada X-Ray ile {len(found_news_links)} adet GERÇEK haber tespit edildi.")

              new_saved_news = [n['title'] for n in found_news_links]
              news_to_process = []

              if not old_news:
                  print("Adım 3: İlk çalıştırma. Sisteme 10 yeni haber atılıyor.")
                  news_to_process = found_news_links[:10]
              else:
                  for news in reversed(found_news_links):
                      if news['title'] not in old_news:
                          news_to_process.append(news)

              print(f"Adım 4: Telegram'a atılacak YENİ haber sayısı: {len(news_to_process)}")

              for news in news_to_process:
                  print(f"İçeriği Çekiliyor: {news['title'][:40]}...")
                  try:
                      try:
                          # Timeout olursa patlamaması için ekstra koruma
                          page.goto(news['link'], timeout=20000, wait_until="domcontentloaded")
                          page.wait_for_timeout(2000)
                      except Exception:
                          pass # Zaman aşımı olsa bile haber metni genelde yüklenmiş olur, devam et.

                      art_soup = BeautifulSoup(page.content(), 'html.parser')

                      paragraphs = art_soup.select('article p, div[class*="body"] p')
                      if not paragraphs:
                          paragraphs = art_soup.find_all('p')

                      temiz_paragraflar = []
                      for p_tag in paragraphs:
                          metin = p_tag.get_text(strip=True)
                          if len(metin) > 30 and not any(yasak in metin for yasak in yasakli_icerikler):
                              temiz_paragraflar.append(metin)

                      full_text = "\n\n".join(temiz_paragraflar)

                      if not full_text:
                          full_text = "Bu haber detayına ulaşılamadı. Muhtemelen sadece bir görselden ibaret veya şifreli."

                      limit = 3500
                      text_chunks = []
                      temp_text = full_text

                      while len(temp_text) > limit:
                          split_at = temp_text.rfind('\n\n', 0, limit)
                          if split_at == -1: split_at = temp_text.rfind('. ', 0, limit)
                          if split_at == -1: split_at = temp_text.rfind(' ', 0, limit)
                          if split_at == -1: split_at = limit

                          if temp_text[split_at:split_at+2] == '. ': split_at += 1

                          text_chunks.append(temp_text[:split_at].strip())
                          temp_text = temp_text[split_at:].strip()

                      if temp_text: text_chunks.append(temp_text)

                      for i, chunk in enumerate(text_chunks):
                          if len(text_chunks) == 1:
                              msg = f"<b>{html.escape(news['title'])}</b>\n<blockquote>{html.escape(chunk)}\n\n<a href='{news['link']}'>[TradingView'de Oku]</a></blockquote>"
                          else:
                              if i == 0:
                                  msg = f"<b>{html.escape(news['title'])}</b>\n<blockquote>{html.escape(chunk)} <i>\n\n(Devamı ⬇️)</i></blockquote>"
                              elif i == len(text_chunks) - 1:
                                  msg = f"<blockquote>{html.escape(chunk)}\n\n<a href='{news['link']}'>[TradingView'de Oku]</a></blockquote>"
                              else:
                                  msg = f"<blockquote>{html.escape(chunk)} <i>\n\n(Devamı ⬇️)</i></blockquote>"

                          tg_url = f"https://api.telegram.org/bot{token}/sendMessage"
                          payload = {"chat_id": chat_id, "text": msg, "parse_mode": "HTML", "link_preview_options": {"is_disabled": True}}
                          requests.post(tg_url, json=payload, timeout=10)
                          time.sleep(2)

                  except Exception as e:
                      print(f"Haber içeriği çekilirken ufak bir pürüz: {e}")

              browser.close()

          if new_saved_news and len(new_saved_news) > 5:
              with open(cache_file, "w") as f:
                  json.dump(new_saved_news, f)
              print("İşlem tamam, yeni liste başarıyla hafızaya kazındı.")

      - name: Güçlendirilmiş Cache Kaydı
        run: |
          git config --global user.email "action@github.com"
          git config --global user.name "GitHub Action"
          git add tv_news_cache.json || echo "Eklenecek dosya yok"
          git commit -m "TV önbellek güncellendi [skip ci]" || echo "Değişiklik yok"
          git pull --rebase || echo "Çekilecek yeni bir şey yok"
          git push || echo "Push hatası, sonraki turda tekrar denenecek"
